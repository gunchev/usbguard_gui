name: Makefile CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Podman and Run on Fedora
      run: |
        sudo apt-get update && sudo apt-get install -y podman
        podman run --rm -v "$PWD:/work" -w "/work" quay.io/fedora/fedora:latest bash -c '
          dnf -y install gcc fedora-packager make gcc uv python3 python3-devel python3-cairo cairo-gobject-devel cairo-devel libglvnd-glx
          make test
        '
