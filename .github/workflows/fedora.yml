name: Fedora CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        fedora: [ 43, 44 ]
    container:
      image: quay.io/fedora/fedora:${{ matrix.fedora }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run tox on Fedora ${{ matrix.fedora }}
        run: |
          dnf -y install uv python3 python3.10 python3.11 python3.12 python3.13 make gcc fedora-packager \
            python3-devel python3-cairo cairo-gobject-devel cairo-devel libglvnd-glx libglvnd-egl
          UV_PYTHON_DOWNLOADS=never QT_QPA_PLATFORM=offscreen uv run tox
